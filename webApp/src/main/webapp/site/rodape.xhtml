<ui:composition

    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="http://java.sun.com/jsf/facelets"
    xmlns:p="http://primefaces.org/ui"
    xmlns:o="http://omnifaces.org/ui"

    xmlns:SBDev="http://xmlns.jcp.org/jsf/composite/SBComp/composite/devel"

    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core">
    <h:outputScript library="js" name="caramelo-push.js"/>

    <ui:fragment rendered="#{sessaoAtualSBWP.identificado}">
        <h:outputScript>
            CarameloPush.iniciarSessao(
            '#{sessaoAtualSBWP.usuario.email}',
            function(data) {
            notificacoesPush(data);
            }
            );
        </h:outputScript>
    </ui:fragment>

    <SBDev:infoPagina />

</ui:composition>
