<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:cc="http://java.sun.com/jsf/composite"
    xmlns:p="http://primefaces.org/ui"
    xmlns:pe="http://primefaces.org/ui/extensions"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"


    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core">
    <!-- INTERFACE -->
    <cc:interface>
        <cc:attribute name="objetoSimples"
                      type="com.super_bits.modulosSB.SBCore.modulos.objetos.registro.ComoEntidadeGenerica" required="true"/>

    </cc:interface>
    <!-- IMPLEMENTATION -->
    <cc:implementation>

        <h:panelGroup layout="block"
                      styleClass="status-container" rendered="#{servicoVisualizacaoComponente.visualizarEstiloStatus(cc.attrs.objetoSimples)}"
                      >
            <h:panelGroup styleClass="status-icon #{servicoVisualizacaoComponente.getIcone(valor)} Fs24" style="color: #{servicoVisualizacaoComponente.getCor(cc.attrs.objetoSimples)}"  />
            <h:panelGroup styleClass="statusText Fs16"  >
                #{cc.attrs.objetoSimples.nome}
            </h:panelGroup>

        </h:panelGroup>


        <h:panelGroup layout="block"
                      style="padding-left: 18px;padding-top: 21px;"
                      rendered="#{servicoVisualizacaoComponente.visualizarEstiloIcone(cc.attrs.objetoSimples)}"
                      styleClass="Container12 OrganizadorContainerEsquerda"
                      >

            <p:panelGrid columns="1">
                <h:panelGroup styleClass="#{servicoVisualizacaoComponente.getIcone(cc.attrs.objetoSimples)} Fs40" style="color: #{servicoVisualizacaoComponente.getCor(cc.attrs.objetoSimples)}"  >

                </h:panelGroup>

                <h:panelGroup styleClass="statusText Fs16" rendered="#{servicoVisualizacaoComponente.getIcone(cc.attrs.objetoSimples) == null}"  >
                    #{cc.attrs.objetoSimples.nome}

                </h:panelGroup>
            </p:panelGrid>
        </h:panelGroup>


        <h:panelGroup
            layout="block"
            style="padding-left: 3px;padding-top: 3px;padding-bottom: 6px;"
            styleClass="Container12 OrganizadorContainer"
            rendered="#{servicoVisualizacaoComponente.visualizarEstiloNomeImagem(cc.attrs.objetoSimples)}" >
            <img src="#{sessaoAtualSBWP.urlHostDaSessao}/proxyImagem/#{servicoVisualizacaoComponente.getImagemURl(cc.attrs.objetoSimples)}"
                 style="max-width: 120px;max-height: 60px;"/>
        </h:panelGroup>

        <h:panelGroup rendered="#{servicoVisualizacaoComponente.visualizarEstiloNomeSimples(cc.attrs.objetoSimples)}" styleClass="statusText Fs16"  >
            #{servicoVisualizacaoComponente.getEntidadeSimplesNome(cc.attrs.objetoSimples)}
        </h:panelGroup>



    </cc:implementation>
</ui:composition>
