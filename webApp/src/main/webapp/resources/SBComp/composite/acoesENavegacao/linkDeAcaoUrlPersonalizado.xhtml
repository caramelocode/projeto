<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:p="http://primefaces.org/ui"
    xmlns:cc="http://xmlns.jcp.org/jsf/composite"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:sb="http://superbitsframework/ui"
    xmlns:c="http://xmlns.jcp.org/jsp/jstl/core">
    <!-- INTERFACE -->
    <cc:interface
        shortDescription="Cria um botão, referenciando ao link da ação ex: http://www.portal.com.br/NomeDaAcaoDeGestao/ac-acaoSecundaria.html "
        >
        <cc:attribute name="acao" type="com.super_bits.modulosSB.SBCore.modulos.Controller.Interfaces.acoes.ComoAcaoDoSistema"
                      shortDescription="A ação que será exibida " />
        <cc:attribute name="javaScriptOncomplete"  default="acoesPosAjax();"
                      shortDescription="Javascript que deve ser executado após a execucao do botão"
                      />
        <cc:attribute name="url" required="true" />
        <cc:attribute name="cor"
                      default="#{null}"
                      shortDescription="Cor do botão caso ele deva ser exibido por em uma cor especifica"
                      />
        <cc:attribute name="label"
                      shortDescription="Label do botão"
                      default="#{cc.attrs.acao.nomeAcao}"
                      type="java.lang.String"
                      />
        <cc:attribute name="classeEstilo"

                      default="#{null}"
                      shortDescription="Especifica uma classe para estilizar o botão"
                      />
    </cc:interface>
    <!-- IMPLEMENTATION -->
    <cc:implementation>



        <p:button href="#{cc.attrs.url}"
                  styleClass="btnIconeENome botao #{cc.attrs.classeEstilo}"
                  icon="#{cc.attrs.acao.iconeAcao}"
                  value="#{cc.attrs.label}"
                  target="_parent"

                  />



    </cc:implementation>
</ui:composition>
