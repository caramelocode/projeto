<ui:composition
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:cc="http://java.sun.com/jsf/composite"
    xmlns:p="http://primefaces.org/ui"
    xmlns:pe="http://primefaces.org/ui/extensions"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:SBAcaoNav="http://xmlns.jcp.org/jsf/composite/SBComp/composite/acoesENavegacao"
    >
    <div class="Container12 BordBottom BlueBack loginback">
        <div class="quebraBlocoComEspacoVertical6"></div>

        <div class="Wid90 MarAuto">
            <div class="Wid30 DispBlock MarAuto WidAutoOnMobile">
                <div class="Card TexAlCenter" style="margin-bottom:-650px;">
                    <h:graphicImage name="logoHorizontal.png" id="logo" library="img"  style="max-width:180px;"/>
                    <div class="SeparatorFull"></div>
                    <div class="Wid100 OvHidden BigTopic"><i class="icon-security DispBlock"></i> Login </div>
                    <div class="quebraBlocoComEspacoVertical3"></div>
                    <div class="Card SoftGrayBack">
                        <p:inputText placeholder="Nome de Usuário" styleClass="Wid90 TexAlCenter"/>
                        <div class="quebraBlocoComEspacoVertical10"></div>
                        <p:inputText type="password" placeholder="Senha" styleClass="Wid90 TexAlCenter"/>
                        <div class="quebraBlocoComEspacoVertical4"></div>

                        <div class="quebraBlocoComEspacoVertical4"></div>
                        <p:button value="Entrar" icon="fa fa-sign-in" href="dashboard.xhtml" styleClass="CyanButton"/>
                        <div class="quebraBlocoComEspacoVertical10 somenteMobile"></div>
                        <p:button value="Esqueceu a senha ?" icon="fa fa-lock" styleClass="RedButton"/>
                    </div>

                </div>
            </div>
        </div>

        <div class="quebraBlocoComEspacoVertical10"></div>
    </div>


</ui:composition>
