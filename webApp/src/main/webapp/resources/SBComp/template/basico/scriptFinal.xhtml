<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core">
    <h:panelGroup rendered="true">


        <h:form id="formularioComunicacao" >

            <h:inputHidden  id="codigoComunicacao" value="#{pgUtilComunicacao.codigoComunicacao}" class="codigoComunicado" />
            <p:commandButton   widgetVar="botaoAbrirModalConversa" update="@form"
                               style="display:none"  actionListener="#{pgUtilComunicacao.exibirModalComunicacaoCodigo()}">
                <p:ajax event="dialogReturn"
                        update="#{pgUtil.gerarCaminhoCompletoID(layoutIdsAreasConhecidas.AREA_TOPO_ITERNFACES)}"
                        />
            </p:commandButton>
        </h:form>
        <h:form>
            <p:remoteCommand actionListener="#{pgUtilComunicacao.removerNotificacoes()}" name="removerNotificacoes"
                             update="#{pgUtil.gerarCaminhoCompletoID(layoutIdsAreasConhecidas.AREA_TOPO_ITERNFACES)}"
                             />
        </h:form>




        <h:form id="formularioComunicacaoRespostaRapida" >

            <h:inputHidden  id="codigoSeloCMRespostaRapida" value="#{pgUtilComunicacao.codigoComunicacao}" class="codigoSeloCMRespostaRapida" />
            <h:inputHidden  id="codigoRespostaRapida" value="#{pgUtilComunicacao.idTipoResposta}" class="codigoRespostaRapida" />
            <p:commandButton   widgetVar="respostaRapidaAct"
                               update="#{pgUtil.gerarCaminhoCompletoID(layoutIdsAreasConhecidas.AREA_TOPO_ITERNFACES)}"
                               style="display:none"  actionListener="#{pgUtilComunicacao.respostaRapida()}">

            </p:commandButton>
        </h:form>


        <h:panelGroup id="areaNotificacaoBloqueio" styleClass="areaNotificacaoBloqueio" >
            <h:panelGroup rendered="#{sessaoAtualSBWP.notificacoesBloqueioTela.size() > 0}"   layout="block">

                <script type="text/javascript">
                    $(document).ready(function () {
                        responderConversa('#{sessaoAtualSBWP.notificacoesBloqueioTela.get(0).codigoSelo}');
                    });
                </script>
            </h:panelGroup>
        </h:panelGroup>

        <p:dialog id="modalNotificacaoTransitoria"
                  widgetVar="modalNotificacaoTransitoria"
                  modal="true"
                  closable="true"
                  draggable="false"
                  resizable="false"
                  appendTo="@(body)"
                  styleClass="modal-transitorio">

            <f:facet name="header">
                <div class="notif-header">
                    <span id="notif-assunto" class="notif-assunto"></span>
                    <span id="notif-meta"    class="notif-meta"></span>
                </div>
            </f:facet>

            <div class="notif-body">
                <p id="notif-mensagem" class="notif-mensagem"></p>
            </div>

            <f:facet name="footer">
                <div id="notif-footer" class="notif-footer"></div>
            </f:facet>

        </p:dialog>
        <h:outputScript>
            CarameloCode.formulario.paginaInstanciaID = '#{paginaAtual.infoPagina.paginaInstanciaID}';
        </h:outputScript>

    </h:panelGroup>
</ui:composition>
