<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:SBAcaoNav="http://xmlns.jcp.org/jsf/composite/SBComp/composite/acoesENavegacao"
                xmlns:SBComp="http://xmlns.jcp.org/jsf/composite/resources/SBComp">
    <div class="">
        <div class="CardTopic">
            #{paginaAtual.infoPagina.acaoSelecionada.nomeAcao}
            <i class="#{paginaAtual.infoPagina.acaoSelecionada.iconeAcao} Fs30 Fleft MarRight10"></i>
            <br/>
            <div class="quebraBlocoComEspacoVertical10 somenteMobile"></div>

            <span class="CardSubTopic">
                #{paginaAtual.infoPagina.acaoSelecionada.descricao}
            </span>

            <h:panelGroup styleClass="Fright Container3" layout="block">
                <h:form>
                    <SBAcaoNav:botaoDeAcao_Pagina acao="#{paginaAtual.infoPagina.comoPaginaEntidade.acaoListarRegistros}"
                                                  tipoVisualizacao="#{layoutsComponenteSB.layoutBotoes.iconeENome}"
                                                  rendered="#{paginaAtual.infoPagina.comoPaginaEntidade.acaoListarRegistros!=null}"


                                                  />
                </h:form>
            </h:panelGroup>

        </div>

        <div class="SeparatorFull"></div>

        <div class="ContainerIndent">
            <h:panelGroup  styleClass="Container12 OrganizadorContainer" layout="block" >
                <ui:insert name="conteudo" />

            </h:panelGroup>

        </div>
    </div>

</ui:composition>
